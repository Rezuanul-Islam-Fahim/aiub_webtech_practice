<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Registration Form</title>
    </head>

    <body>
        <h2>Registration Form</h2>
        <form method="POST" action="#">

            <label for="fullName">Full Name:</label> <br/>
            <input type="text" name="fullName" id="fullName" required> <br/> <br/>

            <label for="email">Email:</label> <br/>
            <input type="email" id="email" name="email" required> <br/> <br/>

            <label for="phoneNumber">Phone Number:</label> <br/>
            <input type="number" id="phoneNumber" name="phoneNumber" required> <br/> <br/>

            <label>Gender</label> <br/>
            <input type="radio" name="gender" id="male" value="Male" required>
            <label for="male">Male</label>
            <input type="radio" name="gender" id="female" value="Female" required>
            <label for="female">Female</label>
            <input type="radio" name="gender" id="other" value="Other" required>
            <label for="other">Other</label> <br/> <br/>

            <label for="dateOfBirth">Date of birth:</label> <br/>
            <input type="date" name="dateOfBirth" id="dateOfBirth" required> <br/> <br/>

            <label for="password">Password:</label> <br/>
            <input type="password" name="password" id="password" required> <br/> <br/>

            <label for="confirmPassword">Confirm Password:</label> <br/>
            <input type="password" name="confirmPassword" id="confirmPassword" required> <br/> <br/>

            <label for="address">Address:</label> <br/>
            <textarea name="address" id="address" cols="30" rows="7"></textarea> <br/> <br/>

            <label for="department">Department:</label> <br/>
            <select name="department" id="department">
                <option value="CSE">CSE</option>
                <option value="BBA">BBA</option>
                <option value="EEE">EEE</option>
                <option value="LLB">LLB</option>
            </select> <br/> <br/>

            <input type="checkbox" name="terms" id="terms">
            <label for="terms">I agree to the terms of service.</label> <br/> <br/>

            <input type="submit" value="Register">
        </form>
    </body>
</html>
