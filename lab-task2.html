<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Registration Form</title>
        <link rel="stylesheet" href="external-styles.css"/>

        <style>
            body {
                background-color: #d6d6d6;
                margin: 0;
                padding: 0;
                font-family: Arial, Helvetica, sans-serif
            }
    
            form {
                background-color: white;
                border: 1px solid grey;
                width: 600px;
                margin: 40px auto;
                padding: 30px;
                border-radius: 20px;
            }
    
            input, textarea, select {
                width: 100%;
                margin: 0;
                margin-top: 5px;
                padding: 8px;
                border-radius: 10px;
                border: 1px solid grey;
            }
        </style>
    </head>

    <body>
        <h2 style="text-align: center; text-decoration: underline;">Registration Form</h2>
        <form method="POST" action="#">

            <label for="fullName">Full Name:</label> <br/>
            <input type="text" name="fullName" id="fullName" required> <br/> <br/>

            <label for="email">Email:</label> <br/>
            <input type="email" id="email" name="email" required> <br/> <br/>

            <label for="phoneNumber">Phone Number:</label> <br/>
            <input type="number" id="phoneNumber" name="phoneNumber" required> <br/> <br/>

            <label>Gender</label> <br/>
            <input type="radio" name="gender" id="male" value="Male" required>
            <label for="male">Male</label>
            <input type="radio" name="gender" id="female" value="Female" required>
            <label for="female">Female</label>
            <input type="radio" name="gender" id="other" value="Other" required>
            <label for="other">Other</label> <br/> <br/>

            <label for="dateOfBirth">Date of birth:</label> <br/>
            <input type="date" name="dateOfBirth" id="dateOfBirth" required> <br/> <br/>

            <label for="password">Password:</label> <br/>
            <input type="password" name="password" id="password" required> <br/> <br/>

            <label for="confirmPassword">Confirm Password:</label> <br/>
            <input type="password" name="confirmPassword" id="confirmPassword" required> <br/> <br/>

            <label for="address">Address:</label> <br/>
            <textarea name="address" id="address" cols="30" rows="7"></textarea> <br/> <br/>

            <label for="department">Department:</label> <br/>
            <select name="department" id="department">
                <option value="CSE">CSE</option>
                <option value="BBA">BBA</option>
                <option value="EEE">EEE</option>
                <option value="LLB">LLB</option>
            </select> <br/> <br/>

            <input type="checkbox" name="terms" id="terms">
            <label for="terms">I agree to the terms of service.</label> <br/> <br/>

            <input type="submit" class="submit" value="Submit">
            <input type="submit" class="reset" value="Reset">
        </form>
    </body>
</html>
